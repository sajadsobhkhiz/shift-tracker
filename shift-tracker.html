<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shift Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f1419;
    --surface: #1a1f29;
    --surface-2: #232a37;
    --border: #2d3544;
    --text: #e8ecf1;
    --text-dim: #8b95a7;
    --accent: #ffb347;
    --accent-dim: #c8862e;
    --success: #6dd394;
    --danger: #ff7a8a;
    --radius: 14px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  body {
    background: radial-gradient(ellipse at top, #1a2030 0%, #0f1419 60%);
    padding-bottom: 40px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding: 4px 4px 16px 4px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .rate-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .rate-display b {
    color: var(--accent);
    font-weight: 600;
  }

  .rate-display:active { transform: scale(0.97); }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 11px 8px;
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--surface-2);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.25s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }

  .card h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }

  input, select {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    padding: 11px 12px;
    width: 100%;
    min-width: 0;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="date"], input[type="time"] {
    font-size: 14px;
    padding: 11px 8px;
    text-align: left;
  }

  input[type="date"]::-webkit-date-and-time-value,
  input[type="time"]::-webkit-date-and-time-value {
    text-align: left;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn {
    background: var(--accent);
    color: #1a1410;
    border: none;
    border-radius: 10px;
    padding: 13px 16px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }

  .btn:active { transform: scale(0.98); opacity: 0.9; }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 13px;
    width: auto;
  }

  .quick-action {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .quick-action .btn { flex: 1; }

  .shift-list { display: flex; flex-direction: column; gap: 10px; }

  .shift-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .shift-info { flex: 1; min-width: 0; }

  .shift-date {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .shift-time {
    font-size: 15px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .shift-meta {
    display: flex;
    gap: 12px;
    font-size: 13px;
    margin-top: 6px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }

  .shift-meta b { color: var(--accent); font-weight: 600; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-box {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stat-value {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .stat-value.accent {
    color: var(--accent);
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
  }

  .period-selector {
    display: flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 14px;
  }

  .period-btn {
    flex: 1;
    padding: 9px;
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  .period-btn.active {
    background: var(--accent);
    color: #1a1410;
  }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
    backdrop-filter: blur(4px);
  }

  .modal-bg.show { display: flex; animation: fadeIn 0.2s; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    width: 100%;
    max-width: 380px;
  }

  .modal h3 {
    font-size: 17px;
    margin-bottom: 16px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .modal-actions .btn { flex: 1; }

  .input-prefix {
    position: relative;
  }

  .input-prefix::before {
    content: '$';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 15px;
    pointer-events: none;
  }

  .input-prefix input {
    padding-left: 26px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 18px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .export-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .export-row .btn {
    flex: 1;
    min-width: 110px;
    font-size: 14px;
    padding: 11px 10px;
  }

  .backup-row {
    display: flex;
    gap: 8px;
  }

  .backup-row .btn {
    flex: 1;
    font-size: 13px;
    padding: 10px;
  }

  /* ============ PRINTABLE REPORT (off-screen) ============ */
  #printableReport {
    position: fixed;
    top: -10000px;
    left: 0;
    width: 800px;
    background: white;
    color: #1a1f29;
    padding: 48px 56px;
    font-family: 'Inter', system-ui, sans-serif;
    box-sizing: border-box;
  }

  #printableReport .pr-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid #1a1f29;
    padding-bottom: 18px;
    margin-bottom: 32px;
  }

  #printableReport .pr-title {
    font-family: 'Instrument Serif', serif;
    font-size: 38px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: #1a1f29;
    line-height: 1;
  }

  #printableReport .pr-title em {
    color: #c8862e;
    font-style: italic;
  }

  #printableReport .pr-period {
    font-size: 13px;
    color: #6b7280;
    margin-top: 8px;
    font-weight: 500;
  }

  #printableReport .pr-meta {
    text-align: right;
    font-size: 12px;
    color: #6b7280;
    line-height: 1.7;
  }

  #printableReport .pr-meta b {
    color: #1a1f29;
    font-weight: 600;
  }

  #printableReport .pr-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 36px;
    padding: 20px 24px;
    background: #fafaf7;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
  }

  #printableReport .pr-summary > div {
    border-right: 1px solid #e5e7eb;
    padding-right: 20px;
  }

  #printableReport .pr-summary > div:last-child {
    border-right: none;
  }

  #printableReport .pr-summary-label {
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 8px;
  }

  #printableReport .pr-summary-value {
    font-size: 24px;
    font-weight: 700;
    color: #1a1f29;
    font-variant-numeric: tabular-nums;
  }

  #printableReport .pr-summary-value.earnings {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    color: #c8862e;
    font-size: 28px;
  }

  #printableReport .pr-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b7280;
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e5e7eb;
  }

  #printableReport table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 28px;
  }

  #printableReport thead th {
    text-align: left;
    padding: 10px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #6b7280;
    font-weight: 600;
    border-bottom: 1px solid #d1d5db;
  }

  #printableReport thead th.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #printableReport tbody td {
    padding: 10px 8px;
    border-bottom: 1px solid #f3f4f6;
    font-variant-numeric: tabular-nums;
  }

  #printableReport tbody td.num {
    text-align: right;
  }

  #printableReport tbody td.money {
    font-weight: 600;
    color: #1a1f29;
  }

  #printableReport tbody td.date {
    font-weight: 500;
  }

  #printableReport tfoot td {
    padding: 14px 8px;
    border-top: 2px solid #1a1f29;
    font-weight: 700;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }

  #printableReport tfoot td.num {
    text-align: right;
  }

  #printableReport tfoot td.earnings {
    color: #c8862e;
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 18px;
  }

  #printableReport .pr-footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid #e5e7eb;
    font-size: 11px;
    color: #9ca3af;
    text-align: center;
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.show { display: flex; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Custom date range */
  .custom-range {
    display: none;
    margin-bottom: 14px;
  }

  .custom-range.show { display: block; animation: fadeIn 0.2s ease; }

  .custom-range .form-row { margin-bottom: 12px; }

  .quick-range {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .quick-range button {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .quick-range button:active {
    background: var(--surface);
    color: var(--text);
    transform: scale(0.97);
  }

  @media (max-width: 360px) {
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Shift <span>Tracker</span></h1>
    <div class="rate-display" id="rateDisplay" onclick="openRateModal()">
      <b id="rateText">--</b>/hr
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="add">Add Shift</button>
    <button class="tab" data-tab="list">Shifts</button>
    <button class="tab" data-tab="report">Report</button>
  </div>

  <div class="panel active" id="panel-add">
    <div class="card">
      <h2>New Shift</h2>

      <div class="quick-action">
        <button class="btn btn-secondary" onclick="setNow('start')">Start: Now</button>
        <button class="btn btn-secondary" onclick="setNow('end')">End: Now</button>
      </div>

      <div class="field" style="margin-bottom: 12px;">
        <label>Date</label>
        <input type="date" id="shiftDate">
      </div>

      <div class="form-row">
        <div class="field">
          <label>Start Time</label>
          <input type="time" id="startTime">
        </div>
        <div class="field">
          <label>End Time</label>
          <input type="time" id="endTime">
        </div>
      </div>

      <div id="preview" class="hint" style="margin: 10px 0 14px;"></div>

      <button class="btn" onclick="addShift()">Save Shift</button>
    </div>
  </div>

  <div class="panel" id="panel-list">
    <div class="card">
      <h2>All Shifts</h2>
      <div id="shiftList" class="shift-list"></div>
    </div>
  </div>

  <div class="panel" id="panel-report">
    <div class="card">
      <div class="custom-range show" id="customRange">
        <div class="form-row">
          <div class="field">
            <label>From</label>
            <input type="date" id="rangeFrom">
          </div>
          <div class="field">
            <label>To</label>
            <input type="date" id="rangeTo">
          </div>
        </div>
        <div class="quick-range">
          <button onclick="setQuickRange('last7')">Last 7d</button>
          <button onclick="setQuickRange('last14')">Last 14d</button>
          <button onclick="setQuickRange('last30')">Last 30d</button>
          <button onclick="setQuickRange('thisMonth')">This Month</button>
          <button onclick="setQuickRange('lastMonth')">Last Month</button>
          <button onclick="setQuickRange('all')">All Time</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Shifts</div>
          <div class="stat-value" id="statCount">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Total Hours</div>
          <div class="stat-value" id="statHours">0</div>
        </div>
      </div>

      <div class="stat-box" style="background: linear-gradient(135deg, rgba(255,179,71,0.12), rgba(255,179,71,0.04)); border-color: var(--accent-dim);">
        <div class="stat-label">Total Earnings</div>
        <div class="stat-value accent" id="statEarnings" style="font-size: 32px; margin-top: 4px;">$0</div>
      </div>
    </div>

    <div class="card">
      <h2>Export Report</h2>
      <div class="export-row">
        <button class="btn" onclick="exportPDF()">📄 PDF</button>
        <button class="btn btn-secondary" onclick="exportImage()">🖼 Image</button>
      </div>
      <div class="hint" style="margin-top: 10px;">Share with your boss</div>
    </div>

    <div class="card">
      <h2>Daily Breakdown</h2>
      <div id="dailyBreakdown"></div>
    </div>

    <div class="card">
      <h2>Backup</h2>
      <div class="backup-row">
        <button class="btn btn-secondary" onclick="exportData()">Export JSON</button>
        <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="rateModal">
  <div class="modal">
    <h3>Hourly Rate</h3>
    <div class="field">
      <label>Amount in USD</label>
      <div class="input-prefix">
        <input type="number" id="rateInput" placeholder="25.00" inputmode="decimal" step="0.01">
      </div>
    </div>
    <div class="field" style="margin-top: 12px;">
      <label>Your Name (shown on reports)</label>
      <input type="text" id="nameInput" placeholder="Optional">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeRateModal()">Cancel</button>
      <button class="btn" onclick="saveRate()">Save</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <h3 id="confirmText">Are you sure?</h3>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="btn" id="confirmBtn" style="background: var(--danger); color: white;">Delete</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Off-screen printable report -->
<div id="printableReport"></div>

<script>
// ============= STORAGE KEYS =============
const STORAGE_KEY_SHIFTS = 'shiftTracker.shifts.v1';
const STORAGE_KEY_RATE = 'shiftTracker.rate.v1';
const STORAGE_KEY_NAME = 'shiftTracker.name.v1';

// ============= STATE =============
let shifts = [];
let hourlyRate = 0;
let userName = '';
let currentPeriod = 'custom';
let confirmCallback = null;

// ============= UTILS =============
function formatMoney(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatRate(n) {
  if (n % 1 === 0) return '$' + n;
  return '$' + n.toFixed(2);
}

function formatHours(h) {
  const hours = Math.floor(h);
  const mins = Math.round((h - hours) * 60);
  if (mins === 0) return hours + 'h';
  if (hours === 0) return mins + 'm';
  return hours + 'h ' + mins + 'm';
}

function formatHoursDecimal(h) {
  return h.toFixed(2) + ' h';
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatDateForReport(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTime12(t) {
  const [h, m] = t.split(':').map(Number);
  const period = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}

function todayString() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function nowTimeString() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function calcHours(start, end) {
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let startMin = sh * 60 + sm;
  let endMin = eh * 60 + em;
  if (endMin <= startMin) endMin += 24 * 60;
  return (endMin - startMin) / 60;
}

// ============= STORAGE =============
function loadData() {
  try {
    const rateRaw = localStorage.getItem(STORAGE_KEY_RATE);
    hourlyRate = rateRaw ? JSON.parse(rateRaw) : 0;
  } catch (e) { hourlyRate = 0; }

  try {
    const shiftsRaw = localStorage.getItem(STORAGE_KEY_SHIFTS);
    shifts = shiftsRaw ? JSON.parse(shiftsRaw) : [];
  } catch (e) { shifts = []; }

  try {
    userName = localStorage.getItem(STORAGE_KEY_NAME) || '';
  } catch (e) { userName = ''; }

  shifts.sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return b.start.localeCompare(a.start);
  });
}

function persistShifts() {
  try {
    localStorage.setItem(STORAGE_KEY_SHIFTS, JSON.stringify(shifts));
    return true;
  } catch (e) {
    showToast('Storage error: ' + e.message, 'error');
    return false;
  }
}

function persistRate() {
  try {
    localStorage.setItem(STORAGE_KEY_RATE, JSON.stringify(hourlyRate));
    return true;
  } catch (e) {
    showToast('Storage error: ' + e.message, 'error');
    return false;
  }
}

function persistName() {
  try {
    localStorage.setItem(STORAGE_KEY_NAME, userName);
  } catch (e) {}
}

function saveRate() {
  const v = parseFloat(document.getElementById('rateInput').value);
  if (isNaN(v) || v < 0) {
    showToast('Enter a valid amount', 'error');
    return;
  }
  hourlyRate = v;
  userName = document.getElementById('nameInput').value.trim();
  if (!persistRate()) return;
  persistName();
  closeRateModal();
  updateRateDisplay();
  updatePreview();
  showToast('Saved', 'success');
  if (document.querySelector('.tab.active').dataset.tab === 'report') {
    renderReport();
  }
}

// ============= UI HELPERS =============
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
}

function updateRateDisplay() {
  document.getElementById('rateText').textContent = hourlyRate ? formatRate(hourlyRate) : '$--';
}

function openRateModal() {
  document.getElementById('rateInput').value = hourlyRate || '';
  document.getElementById('nameInput').value = userName || '';
  document.getElementById('rateModal').classList.add('show');
  setTimeout(() => document.getElementById('rateInput').focus(), 100);
}

function closeRateModal() {
  document.getElementById('rateModal').classList.remove('show');
}

function showConfirm(text, callback) {
  document.getElementById('confirmText').textContent = text;
  confirmCallback = callback;
  document.getElementById('confirmModal').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('show');
  confirmCallback = null;
}

document.getElementById('confirmBtn').onclick = () => {
  if (confirmCallback) confirmCallback();
  closeConfirm();
};

// ============= ADD SHIFT =============
function setNow(field) {
  const id = field === 'start' ? 'startTime' : 'endTime';
  document.getElementById(id).value = nowTimeString();
  if (!document.getElementById('shiftDate').value) {
    document.getElementById('shiftDate').value = todayString();
  }
  updatePreview();
}

function updatePreview() {
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;
  const preview = document.getElementById('preview');
  if (start && end) {
    const h = calcHours(start, end);
    let txt = formatHours(h);
    if (hourlyRate) {
      txt += ' • ' + formatMoney(h * hourlyRate);
    }
    preview.textContent = txt;
  } else {
    preview.textContent = '';
  }
}

function addShift() {
  const date = document.getElementById('shiftDate').value;
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;

  if (!date || !start || !end) {
    showToast('Fill in date and times', 'error');
    return;
  }

  const hours = calcHours(start, end);
  if (hours <= 0) {
    showToast('Invalid time range', 'error');
    return;
  }

  const shift = {
    id: 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    date,
    start,
    end,
    hours,
    rate: hourlyRate,
    createdAt: Date.now()
  };

  shifts.unshift(shift);
  shifts.sort((a, b) => {
    if (a.date !== b.date) return b.date.localeCompare(a.date);
    return b.start.localeCompare(a.start);
  });

  if (!persistShifts()) {
    shifts = shifts.filter(s => s.id !== shift.id);
    return;
  }

  showToast('Shift saved ✓', 'success');
  document.getElementById('startTime').value = '';
  document.getElementById('endTime').value = '';
  document.getElementById('preview').textContent = '';
  renderList();
}

// ============= LIST =============
function renderList() {
  const container = document.getElementById('shiftList');
  if (shifts.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div>No shifts yet</div>
      </div>`;
    return;
  }

  container.innerHTML = shifts.map(s => {
    const earnings = s.hours * (s.rate || hourlyRate || 0);
    return `
      <div class="shift-item">
        <div class="shift-info">
          <div class="shift-date">${formatDate(s.date)}</div>
          <div class="shift-time">${formatTime12(s.start)} → ${formatTime12(s.end)}</div>
          <div class="shift-meta">
            <span>${formatHours(s.hours)}</span>
            <span><b>${formatMoney(earnings)}</b></span>
          </div>
        </div>
        <button class="btn-danger" onclick="confirmDelete('${s.id}')">Delete</button>
      </div>`;
  }).join('');
}

function confirmDelete(id) {
  showConfirm('Delete this shift?', () => {
    const removed = shifts.find(s => s.id === id);
    shifts = shifts.filter(s => s.id !== id);
    if (!persistShifts()) {
      if (removed) shifts.push(removed);
      return;
    }
    renderList();
    showToast('Deleted', 'success');
  });
}

// ============= REPORT =============
function getPeriodInfo() {
  const from = document.getElementById('rangeFrom').value;
  const to = document.getElementById('rangeTo').value;
  if (!from || !to) {
    return { label: 'Select a date range', shifts: [] };
  }
  if (from > to) {
    return { label: 'Invalid range (From is after To)', shifts: [] };
  }
  const filtered = shifts.filter(s => s.date >= from && s.date <= to);
  const fmtFull = (dStr) => {
    const d = new Date(dStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  };
  return {
    label: `${fmtFull(from)} – ${fmtFull(to)}`,
    shifts: filtered
  };
}

function renderReport() {
  const info = getPeriodInfo();
  const periodShifts = info.shifts;
  const totalHours = periodShifts.reduce((sum, s) => sum + s.hours, 0);
  const totalEarnings = periodShifts.reduce((sum, s) => sum + s.hours * (s.rate || hourlyRate || 0), 0);

  document.getElementById('statCount').textContent = periodShifts.length;
  document.getElementById('statHours').textContent = formatHours(totalHours);
  document.getElementById('statEarnings').textContent = formatMoney(totalEarnings);

  const byDate = {};
  for (const s of periodShifts) {
    if (!byDate[s.date]) byDate[s.date] = { hours: 0, earnings: 0, count: 0 };
    byDate[s.date].hours += s.hours;
    byDate[s.date].earnings += s.hours * (s.rate || hourlyRate || 0);
    byDate[s.date].count += 1;
  }

  const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
  const breakdown = document.getElementById('dailyBreakdown');

  if (sortedDates.length === 0) {
    breakdown.innerHTML = `<div class="empty"><div>No shifts in this period</div></div>`;
    return;
  }

  breakdown.innerHTML = sortedDates.map(date => {
    const d = byDate[date];
    return `
      <div class="shift-item" style="margin-bottom: 8px;">
        <div class="shift-info">
          <div class="shift-date">${formatDateShort(date)}</div>
          <div class="shift-meta">
            <span>${d.count} shift${d.count > 1 ? 's' : ''}</span>
            <span>${formatHours(d.hours)}</span>
            <span><b>${formatMoney(d.earnings)}</b></span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ============= PRINTABLE REPORT BUILDER =============
function buildPrintableReport() {
  const info = getPeriodInfo();
  const periodShifts = info.shifts;
  const totalHours = periodShifts.reduce((sum, s) => sum + s.hours, 0);
  const totalEarnings = periodShifts.reduce((sum, s) => sum + s.hours * (s.rate || hourlyRate || 0), 0);

  // Sort chronologically (oldest first) for the report
  const sorted = [...periodShifts].sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return a.start.localeCompare(b.start);
  });

  const generatedDate = new Date().toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric'
  });

  const periodTitle = 'Timesheet Report';

  let rowsHtml = '';
  if (sorted.length === 0) {
    rowsHtml = `<tr><td colspan="5" style="text-align:center; padding: 30px; color: #9ca3af;">No shifts recorded in this period</td></tr>`;
  } else {
    rowsHtml = sorted.map(s => {
      const earnings = s.hours * (s.rate || hourlyRate || 0);
      const rate = s.rate || hourlyRate || 0;
      return `
        <tr>
          <td class="date">${formatDateForReport(s.date)}</td>
          <td>${formatTime12(s.start)} – ${formatTime12(s.end)}</td>
          <td class="num">${formatHoursDecimal(s.hours)}</td>
          <td class="num">${formatRate(rate)}/hr</td>
          <td class="num money">${formatMoney(earnings)}</td>
        </tr>`;
    }).join('');
  }

  const titleParts = periodTitle.split(' ');
  const titleHtml = titleParts.length > 1
    ? `${titleParts[0]} <em>${titleParts.slice(1).join(' ')}</em>`
    : `<em>${periodTitle}</em>`;

  const html = `
    <div class="pr-header">
      <div>
        <div class="pr-title">${titleHtml}</div>
        <div class="pr-period">${info.label}</div>
      </div>
      <div class="pr-meta">
        ${userName ? `<div><b>${escapeHtml(userName)}</b></div>` : ''}
        <div>Generated ${generatedDate}</div>
        <div>Rate: <b>${formatRate(hourlyRate)}/hr</b></div>
      </div>
    </div>

    <div class="pr-summary">
      <div>
        <div class="pr-summary-label">Shifts</div>
        <div class="pr-summary-value">${periodShifts.length}</div>
      </div>
      <div>
        <div class="pr-summary-label">Total Hours</div>
        <div class="pr-summary-value">${totalHours.toFixed(2)}</div>
      </div>
      <div>
        <div class="pr-summary-label">Total Earnings</div>
        <div class="pr-summary-value earnings">${formatMoney(totalEarnings)}</div>
      </div>
    </div>

    <div class="pr-section-title">Shift Details</div>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th class="num">Hours</th>
          <th class="num">Rate</th>
          <th class="num">Earnings</th>
        </tr>
      </thead>
      <tbody>
        ${rowsHtml}
      </tbody>
      ${sorted.length > 0 ? `
      <tfoot>
        <tr>
          <td colspan="2">TOTAL</td>
          <td class="num">${totalHours.toFixed(2)} h</td>
          <td class="num"></td>
          <td class="num earnings">${formatMoney(totalEarnings)}</td>
        </tr>
      </tfoot>
      ` : ''}
    </table>

    <div class="pr-footer">
      Generated by Shift Tracker
    </div>
  `;

  document.getElementById('printableReport').innerHTML = html;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ============= EXPORT =============
async function captureReport() {
  buildPrintableReport();
  // Wait one frame for DOM to render
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  const el = document.getElementById('printableReport');
  const canvas = await html2canvas(el, {
    scale: 2,
    backgroundColor: '#ffffff',
    logging: false,
    useCORS: true
  });
  return canvas;
}

function getExportFilename(ext) {
  const from = document.getElementById('rangeFrom').value;
  const to = document.getElementById('rangeTo').value;
  if (from && to) return `timesheet-${from}_to_${to}.${ext}`;
  return `timesheet-${todayString()}.${ext}`;
}

async function exportImage() {
  if (shifts.length === 0) {
    showToast('No data to export', 'error');
    return;
  }
  showLoading(true);
  try {
    const canvas = await captureReport();
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const filename = getExportFilename('png');
    showLoading(false);
    await shareOrDownload(blob, filename, 'image/png');
  } catch (e) {
    showLoading(false);
    showToast('Export failed: ' + e.message, 'error');
  }
}

async function exportPDF() {
  if (shifts.length === 0) {
    showToast('No data to export', 'error');
    return;
  }
  showLoading(true);
  try {
    const canvas = await captureReport();
    const imgData = canvas.toDataURL('image/png');

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4'
    });

    // A4 = 210 x 297 mm
    const pageW = 210;
    const pageH = 297;
    const margin = 10;
    const usableW = pageW - margin * 2;

    const imgRatio = canvas.height / canvas.width;
    const imgW = usableW;
    let imgH = imgW * imgRatio;

    // If it fits on one page, simple add
    if (imgH <= pageH - margin * 2) {
      pdf.addImage(imgData, 'PNG', margin, margin, imgW, imgH);
    } else {
      // Multi-page handling: slice the canvas
      const pageContentH = pageH - margin * 2;
      const sliceHeightPx = (pageContentH / imgRatio) * (canvas.width / imgW);

      let y = 0;
      let pageNum = 0;
      while (y < canvas.height) {
        const sliceH = Math.min(sliceHeightPx, canvas.height - y);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = sliceH;
        const ctx = sliceCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
        ctx.drawImage(canvas, 0, y, canvas.width, sliceH, 0, 0, canvas.width, sliceH);

        const sliceData = sliceCanvas.toDataURL('image/png');
        const sliceImgH = (sliceH / canvas.width) * imgW;

        if (pageNum > 0) pdf.addPage();
        pdf.addImage(sliceData, 'PNG', margin, margin, imgW, sliceImgH);

        y += sliceH;
        pageNum++;
      }
    }

    const filename = getExportFilename('pdf');
    const pdfBlob = pdf.output('blob');
    showLoading(false);
    await shareOrDownload(pdfBlob, filename, 'application/pdf');
  } catch (e) {
    showLoading(false);
    showToast('Export failed: ' + e.message, 'error');
  }
}

// Try Web Share API first (opens native share sheet on iOS/Android),
// fall back to download if not available
async function shareOrDownload(blob, filename, mimeType) {
  const file = new File([blob], filename, { type: mimeType });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'Timesheet Report'
      });
      showToast('Shared ✓', 'success');
      return;
    } catch (e) {
      // User cancelled share — don't fall back to download, just exit silently
      if (e.name === 'AbortError') return;
      // For other errors, fall through to download
    }
  }

  // Fallback: regular download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Saved ✓', 'success');
}

// ============= JSON EXPORT / IMPORT =============
function exportData() {
  const data = { rate: hourlyRate, name: userName, shifts, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `shifts-backup-${todayString()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.shifts)) throw new Error('Invalid file');
      showConfirm(`Import ${data.shifts.length} shifts? This replaces current data.`, () => {
        shifts = data.shifts;
        if (typeof data.rate === 'number') hourlyRate = data.rate;
        if (typeof data.name === 'string') userName = data.name;
        persistShifts();
        persistRate();
        persistName();
        updateRateDisplay();
        renderList();
        renderReport();
        showToast('Imported successfully', 'success');
      });
    } catch (err) {
      showToast('Invalid JSON file', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============= TABS =============
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'list') renderList();
    if (btn.dataset.tab === 'report') {
      const fromInput = document.getElementById('rangeFrom');
      const toInput = document.getElementById('rangeTo');
      if (!fromInput.value || !toInput.value) {
        setQuickRange('last7');
      } else {
        renderReport();
      }
    }
  };
});

document.getElementById('rangeFrom').addEventListener('change', renderReport);
document.getElementById('rangeTo').addEventListener('change', renderReport);

function setQuickRange(type) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let from, to;

  const toStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  if (type === 'last7') {
    from = new Date(today); from.setDate(today.getDate() - 6);
    to = today;
  } else if (type === 'last14') {
    from = new Date(today); from.setDate(today.getDate() - 13);
    to = today;
  } else if (type === 'last30') {
    from = new Date(today); from.setDate(today.getDate() - 29);
    to = today;
  } else if (type === 'thisMonth') {
    from = new Date(today.getFullYear(), today.getMonth(), 1);
    to = today;
  } else if (type === 'lastMonth') {
    from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    to = new Date(today.getFullYear(), today.getMonth(), 0);
  } else if (type === 'all') {
    if (shifts.length === 0) {
      from = today;
      to = today;
    } else {
      const dates = shifts.map(s => s.date).sort();
      from = new Date(dates[0] + 'T00:00:00');
      to = today;
    }
  }

  document.getElementById('rangeFrom').value = toStr(from);
  document.getElementById('rangeTo').value = toStr(to);
  renderReport();
}

document.getElementById('startTime').addEventListener('change', updatePreview);
document.getElementById('endTime').addEventListener('change', updatePreview);

document.getElementById('rateModal').addEventListener('click', e => {
  if (e.target.id === 'rateModal') closeRateModal();
});
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target.id === 'confirmModal') closeConfirm();
});

// ============= INIT =============
(function init() {
  document.getElementById('shiftDate').value = todayString();
  loadData();
  updateRateDisplay();
  renderList();

  if (!hourlyRate) {
    setTimeout(() => openRateModal(), 400);
  }
})();
